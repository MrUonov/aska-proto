- type: entity
  id: WallLaboratoty
  parent: BaseWall
  name: laboratory wall
  description: Keeps specimens inside and scientists outside
  components:
  - type: Transform
    noRot: true
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: StructuralMetallicStrong
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 600
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalSlam
    - trigger:
        !type:DamageTrigger
        damage: 400
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalSlam
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: RadiationBlocker
    resistance: 5
  - type: SmoothEdge
  - type: Sprite
    # noRot: true
    sprite: _ScavPrototype/Structures/Walls/labaratory.rsi
    layers:
    - state: dirt
    - map: [ "enum.EdgeLayer.South" ]
      state: dirt_south
    - map: [ "enum.EdgeLayer.East" ]
      state: dirt_east
    - map: [ "enum.EdgeLayer.North" ]
      state: dirt_north
    - map: [ "enum.EdgeLayer.West" ]
      state: dirt_west
  - type: Icon
    sprite: _ScavPrototype/Structures/Walls/labaratory.rsi
    state: dirt
  - type: IconSmooth
    key: walls
    mode: NoSprite
  - type: Appearance
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,0.5,0.5"
        mask:
        - FullTileMask
        layer:
        - WallLayer
        density: 2000
